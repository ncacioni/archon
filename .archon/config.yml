# Archon Configuration
# Generated by: npx github:ncacioni/archon init

project:
  name: ""
  description: ""
  stack: []

mode: solo  # solo | team

solo:
  agents_dir: ".claude/agents/solo"
  agents: [architect, security, spec-writer, builder, frontend, qa, devops, data, ml-engineer]

team:
  agents_dir: ".claude/agents/team"
  preset: "full-stack-app"
  agents_override: []
  presets:
    full-stack-app:
      agents: [architect, security, tech-lead, spec-writer,
               domain-logic, app-services, adapter-layer,
               ui-engineer, ux-researcher,
               data-modeler, pipeline-engineer,
               test-engineer, code-reviewer,
               ci-cd-engineer, observability-engineer, release-manager,
               tech-writer, infra-engineer]
    api-service:
      agents: [architect, security, spec-writer,
               domain-logic, app-services, adapter-layer,
               test-engineer, code-reviewer,
               ci-cd-engineer, release-manager,
               tech-writer]
    data-platform:
      agents: [architect, security, spec-writer,
               data-modeler, pipeline-engineer, warehouse-engineer, dba,
               test-engineer,
               ci-cd-engineer, observability-engineer,
               tech-writer]
    ml-platform:
      agents: [architect, security, spec-writer,
               ml-engineer, data-modeler, pipeline-engineer,
               test-engineer,
               ci-cd-engineer, observability-engineer,
               tech-writer]
    frontend-app:
      agents: [architect, security, spec-writer,
               ui-engineer, ux-researcher,
               adapter-layer,
               test-engineer, code-reviewer,
               ci-cd-engineer, release-manager]
    minimum-viable:
      agents: [architect, security,
               domain-logic, adapter-layer,
               test-engineer,
               ci-cd-engineer]

skills_dir: ".claude/skills"

scout:
  cache_ttl_days: 90
  registries: [npm, github]
  license_whitelist: [MIT, Apache-2.0, BSD-3-Clause, ISC]

maintenance:
  auto_trigger_days: 30
  cve_sources: [npm-audit, github-advisories]

drift:
  threshold: 0.2   # 0.0–1.0 — warn if drift signals exceed this fraction of spec entries
  signals:
    - missing_ref   # spec route not found in source code
    - orphaned_spec # spec schema with no code type
    - scope_creep   # code route with no spec entry
    - naming        # identifier naming mismatch between spec and code
