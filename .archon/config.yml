# Archon v3.0 Configuration
# Generated by: npx archon init

project:
  name: ""
  description: ""
  stack: []

mode: solo  # solo | team

solo:
  agents: [S0, S1, S2, S3, S4, S5, S6, S7, S8]

team:
  preset: "full-stack-app"
  agents_override: []

memory:
  injection_budget: 500
  compaction_threshold: 8000
  graduation: auto

scout:
  cache_ttl_days: 90
  registries: [npm, github]
  license_whitelist: [MIT, Apache-2.0, BSD-3-Clause, ISC]

maintenance:
  auto_trigger_days: 30
  cve_sources: [npm-audit, github-advisories]

tokens:
  show_estimate: true
  track_actual: true
