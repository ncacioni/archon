id: controls-matrix
description: "Map controls to NIST 800-53 / ISO 27001 / OWASP"
when_to_use: "During compliance review, security gate, or when generating audit evidence"
input:
  - name: feature_name
    type: string
    required: true
    description: "Feature or component being reviewed"
  - name: frameworks
    type: array
    required: false
    description: "Frameworks to map against: nist-800-53, iso-27001, owasp-top10, tpn-mpa"
template: |
  ## Controls Matrix: {{feature_name}}

  ### NIST 800-53 Rev.5 Mapping

  | Control ID | Control Name | Implementation | Evidence |
  |------------|--------------|----------------|----------|
  | AC-2 | Account Management | | |
  | AC-3 | Access Enforcement | | |
  | AU-2 | Event Logging | | |
  | IA-2 | Identification & Auth | | |
  | SC-8 | Transmission Confidentiality | | |
  | SI-10 | Information Input Validation | | |

  ### ISO 27001:2022 Annex A Mapping

  | Control | Domain | Status | Notes |
  |---------|--------|--------|-------|
  | A.5.15 | Access control | | |
  | A.8.5 | Secure authentication | | |
  | A.8.24 | Cryptography | | |

  ### OWASP Top 10 Coverage

  | OWASP Risk | Applicable? | Mitigation | Status |
  |------------|-------------|------------|--------|
  | A01 Broken Access Control | | | |
  | A02 Cryptographic Failures | | | |
  | A03 Injection | | | |
  | A07 Auth Failures | | | |

  ### Gaps & Remediation
  - [List any unmapped or partially implemented controls]
output: "controls-matrix.md with compliance coverage percentage"
