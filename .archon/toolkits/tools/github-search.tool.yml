id: github-search
description: "Search GitHub repos for libraries and solutions"
when_to_use: "When looking for open source solutions, reference implementations, or inspiration (agent 25)"
input:
  - name: search_query
    type: string
    required: true
    description: "Search terms for GitHub (e.g. 'fastify jwt auth plugin')"
  - name: language
    type: string
    required: false
    description: "Programming language filter (e.g. javascript, typescript, python)"
template: |
  ## GitHub Search: {{search_query}}

  ### Search Queries
  ```
  # GitHub search URL:
  https://github.com/search?q={{search_query}}&type=repositories&l={{language}}&sort=stars

  # GitHub API:
  curl "https://api.github.com/search/repositories?q={{search_query}}+language:{{language}}&sort=stars&per_page=10" \
    -H "Accept: application/vnd.github.v3+json" | jq '.items[] | {name, full_name, stars: .stargazers_count, forks: .forks_count, updated: .updated_at, description}'
  ```

  ### Top Candidates

  | Repo | Stars | Forks | Last Commit | License | Description |
  |------|-------|-------|------------|---------|-------------|
  | [owner/repo] | | | | | |
  | [owner/repo] | | | | | |
  | [owner/repo] | | | | | |

  ### Health Signals
  | Repo | Open Issues | PRs merged/mo | Contributors | Test Coverage | CI Status |
  |------|-------------|---------------|--------------|--------------|-----------|
  | | | | | | |

  ### Code Quality Review
  - [ ] README complete and up-to-date
  - [ ] Tests present and meaningful
  - [ ] CI/CD pipeline configured
  - [ ] Security policy (SECURITY.md) present
  - [ ] Recent commits (< 6 months)
  - [ ] No critical open security issues

  ### Recommendation
  **Best match:** [owner/repo]
  **Use as:** [ ] Direct dependency  [ ] Fork  [ ] Reference implementation  [ ] Inspiration only
  **Rationale:** [why this repo]
output: "github-search-report.md with curated shortlist"
