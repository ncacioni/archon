id: accessibility-checklist
description: "WCAG 2.1 AA compliance checklist for components"
when_to_use: "During UI component review or frontend architecture gate (agent 15/16)"
input:
  - name: component_name
    type: string
    required: true
    description: "Name of the UI component being reviewed"
  - name: component_type
    type: string
    required: false
    description: "Type: form, button, modal, navigation, table, image, media"
template: |
  ## Accessibility Checklist: {{component_name}}
  **Type:** {{component_type}} | **Standard:** WCAG 2.1 AA

  ### Perceivable
  - [ ] 1.1.1 Non-text content has text alternative (alt, aria-label)
  - [ ] 1.3.1 Info and relationships conveyed via semantic HTML
  - [ ] 1.3.2 Meaningful sequence preserved without CSS
  - [ ] 1.3.3 Instructions don't rely on shape, color, size alone
  - [ ] 1.4.1 Color not the only means of conveying information
  - [ ] 1.4.3 Contrast ratio ≥ 4.5:1 for normal text
  - [ ] 1.4.4 Text resizable up to 200% without loss of functionality
  - [ ] 1.4.11 Non-text contrast ≥ 3:1 (UI components, graphics)

  ### Operable
  - [ ] 2.1.1 All functionality accessible via keyboard
  - [ ] 2.1.2 No keyboard trap — user can navigate away
  - [ ] 2.4.1 Mechanism to skip repeated navigation blocks
  - [ ] 2.4.3 Focus order is logical and meaningful
  - [ ] 2.4.4 Link purpose clear from text or context
  - [ ] 2.4.7 Focus visible — keyboard focus indicator present

  ### Understandable
  - [ ] 3.1.1 Language of page declared (`lang` attribute)
  - [ ] 3.2.1 No context change on focus
  - [ ] 3.2.2 No context change on input (unless warned)
  - [ ] 3.3.1 Errors identified and described in text
  - [ ] 3.3.2 Labels or instructions provided for inputs

  ### Robust
  - [ ] 4.1.1 Valid HTML — no duplicate IDs, proper nesting
  - [ ] 4.1.2 Name, role, value: all UI components have ARIA roles/states
  - [ ] 4.1.3 Status messages programmatically determinable

  ### Screen Reader Testing
  - [ ] Tested with NVDA / JAWS (Windows)
  - [ ] Tested with VoiceOver (macOS/iOS)
  - [ ] Logical reading order confirmed
  - [ ] Dynamic content updates announced via aria-live

  ### Issues Found
  | Criterion | Issue | Severity | Fix |
  |-----------|-------|----------|-----|
  | | | | |

  ### Decision
  - [ ] WCAG 2.1 AA COMPLIANT
  - [ ] PARTIAL — exceptions documented with roadmap
  - [ ] NON-COMPLIANT — must fix before release
output: "accessibility-audit-[component].md"
